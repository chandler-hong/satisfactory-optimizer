<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Satisfactory Optimizer</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='88'>🏭</text></svg>">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="site-header">
    <h1 class="site-title">Satisfactory Optimizer</h1>
    <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle light/dark theme">
      Toggle theme
    </button>
  </header>

  <nav class="viewtabs" aria-label="Views">
    <button id="tab-factory" class="viewtab is-active" type="button">🏭 Factory Optimizer</button>
    <button id="tab-power" class="viewtab" type="button">⚡ Power Generation</button>
  </nav>

  <div class="app" id="view-factory">
    <aside class="sidebar" id="inputs">
      <!-- input controls (resource caps, shard budget, belt/pipe tier, recipes, mode, targets) -->
    </aside>
    <main class="results" id="results">
      <!-- rendered PlanView (tiles, resource meters, build table, belt list, diagram) -->
    </main>
  </div>

  <div class="power-view" id="view-power" hidden>
    <!-- power generation calculator (js/ui/power.js) -->
  </div>

  <footer class="site-footer">
    <p>Fan-made — not affiliated with Coffee Stain Studios. Item/building icons © Coffee Stain, via satisfactorytools.com.</p>
  </footer>

  <script type="module" src="js/main.js"></script>
</body>
</html>
